<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理ページ｜横スクロール作品棚</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #171318;
    color: #f7edf7;
  }

  header {
    background: #211a23;
    border-bottom: 1px solid rgba(255,255,255,0.14);
    padding: 14px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-inner {
    max-width: 920px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
  }

  h1 {
    font-size: 18px;
    margin: 0;
  }

  .small {
    color: #c8b8c8;
    font-size: 12px;
    margin-top: 3px;
  }

  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 14px;
  }

  button {
    border: 0;
    border-radius: 999px;
    background: #f1d6e3;
    color: #201820;
    padding: 10px 14px;
    font-weight: 700;
    cursor: pointer;
  }

  button.sub {
    background: transparent;
    color: #f1d6e3;
    border: 1px solid rgba(255,255,255,0.20);
  }

  .bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .bar input {
    flex: 1;
  }

  input, textarea, select {
    width: 100%;
    box-sizing: border-box;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.16);
    background: #2a222d;
    color: #f7edf7;
    padding: 11px;
    font-size: 16px;
  }

  textarea {
    min-height: 86px;
  }

  label {
    display: block;
    margin: 10px 0;
    color: #c8b8c8;
    font-size: 13px;
  }

  .form {
    display: none;
    background: #211a23;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 16px;
  }

  .form.show {
    display: block;
  }

  .check {
    display: flex;
    gap: 8px;
    align-items: center;
    color: #f7edf7;
  }

  .check input {
    width: auto;
  }

  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .post {
    background: #211a23;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 20px;
    margin-bottom: 18px;
    overflow: hidden;
  }

  .post-head {
    padding: 14px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
  }

  .title {
    font-size: 17px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .meta {
    color: #c8b8c8;
    font-size: 12px;
    line-height: 1.6;
  }

  .scroller {
    display: flex;
    flex-direction: row;
    direction: rtl;
    gap: 10px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 0 14px 14px;
    -webkit-overflow-scrolling: touch;
  }

  .frame {
    flex: 0 0 84%;
    scroll-snap-align: center;
    background: #0e0b10;
    border-radius: 16px;
    overflow: hidden;
    min-height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    direction: ltr;
  }

  .frame img {
    width: 100%;
    max-height: 70vh;
    object-fit: contain;
    display: block;
  }

  .cover {
    margin: 0 14px 14px;
    min-height: 220px;
    border-radius: 16px;
    background: #2a222d;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 18px;
  }

  .note {
    padding: 0 14px 14px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .empty, .error {
    background: #211a23;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px;
    padding: 28px 16px;
    text-align: center;
    color: #c8b8c8;
    line-height: 1.7;
  }

  .error {
    display: none;
    color: #ffd6d6;
    text-align: left;
    white-space: pre-wrap;
  }

  .viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.90);
    z-index: 50;
    padding: 52px 10px 76px;
    box-sizing: border-box;
  }

  .viewer.show {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .viewer img {
    max-width: 100%;
    max-height: 78vh;
    object-fit: contain;
    border-radius: 12px;
  }

  .viewer .close {
    position: fixed;
    top: 12px;
    right: 12px;
  }

  .viewer .viewer-actions {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 18px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  @media (max-width: 640px) {
    .bar {
      flex-direction: column;
    }
    .frame {
      flex-basis: 88%;
    }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <h1>管理ページ</h1>
      <div class="small">横スクロール作品棚</div>
    </div>
    <button id="openFormBtn" type="button">＋投稿</button>
  </div>
</header>

<main>
  <div id="errorBox" class="error"></div>

  <div class="bar">
    <input id="searchInput" type="search" placeholder="タイトル・本文で検索">
    <button id="backupBtn" class="sub" type="button">バックアップ</button>
  </div>

  <section id="formBox" class="form">
    <label>タイトル
      <input id="titleInput" type="text" placeholder="例：落書きまとめ">
    </label>

    <label>本文メモ
      <textarea id="noteInput" placeholder="キャプションやメモ"></textarea>
    </label>

    <label>公開状態メモ
      <select id="visibilityInput">
        <option value="自分だけ">自分だけ</option>
        <option value="限定公開">限定公開</option>
        <option value="パスワード">パスワード</option>
      </select>
    </label>

    <label id="passwordLabel" style="display:none;">パスワード
      <input id="passwordInput" type="password" placeholder="合言葉">
    </label>

    <label class="check">
      <input id="sensitiveInput" type="checkbox">
      センシティブ用ワンクッション
    </label>

    <label>画像
      <input id="imageInput" type="file" accept="image/*" multiple>
    </label>

    <div class="small">この管理ページは、このブラウザ内に投稿データを保存します。多くの画像を入れる前に、バックアップを取ることをおすすめします。</div>

    <div class="actions">
      <button id="saveBtn" type="button">保存</button>
      <button id="clearBtn" class="sub" type="button">入力を消す</button>
      <button id="restoreBtn" class="sub" type="button">復元</button>
      <input id="restoreFile" type="file" accept="application/json" style="display:none;">
    </div>
  </section>

  <section id="postsBox"></section>
</main>

<div id="viewer" class="viewer">
  <button id="closeViewerBtn" class="close sub" type="button">閉じる</button>
  <img id="viewerImg" src="" alt="">
  <div class="viewer-actions">
    <button id="nextBtn" class="sub" type="button">次へ</button>
    <button id="prevBtn" class="sub" type="button">前へ</button>
  </div>
</div>

<script>
(function () {
  var KEY = "picShelfAdminRtlV2";
  var posts = [];
  var currentImages = [];
  var currentIndex = 0;

  function el(id) {
    return document.getElementById(id);
  }

  function showError(message) {
    var box = el("errorBox");
    box.style.display = "block";
    box.textContent = "エラーが発生しました。\n\n" + message;
  }

  window.onerror = function (msg, url, line, col, err) {
    showError(String(msg) + "\nline: " + line + "\n" + (err && err.stack ? err.stack : ""));
  };

  function escapeHtml(text) {
    text = String(text == null ? "" : text);
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      posts = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(posts)) posts = [];
    } catch (e) {
      posts = [];
      showError("保存データの読み込みに失敗しました。\n" + e.message);
    }
  }

  function saveStorage() {
    try {
      localStorage.setItem(KEY, JSON.stringify(posts));
    } catch (e) {
      showError("ブラウザ保存に失敗しました。画像が大きすぎる可能性があります。\n\n" + e.message);
    }
  }

  function makeId() {
    return "p" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
  }

  function readImages(files, done) {
    var arr = [];
    var list = Array.prototype.slice.call(files || []);
    var i = 0;

    if (!list.length) {
      done(arr);
      return;
    }

    function next() {
      if (i >= list.length) {
        done(arr);
        return;
      }

      var file = list[i++];
      var reader = new FileReader();

      reader.onload = function () {
        arr.push({
          name: file.name || "image",
          src: String(reader.result)
        });
        next();
      };

      reader.onerror = function () {
        showError("画像の読み込みに失敗しました。");
      };

      reader.readAsDataURL(file);
    }

    next();
  }

  function clearForm() {
    el("titleInput").value = "";
    el("noteInput").value = "";
    el("visibilityInput").value = "自分だけ";
    el("passwordInput").value = "";
    el("passwordLabel").style.display = "none";
    el("sensitiveInput").checked = false;
    el("imageInput").value = "";
  }

  function savePost() {
    var title = el("titleInput").value.trim();
    var note = el("noteInput").value.trim();
    var visibility = el("visibilityInput").value;
    var password = el("passwordInput").value;
    var sensitive = el("sensitiveInput").checked;
    var files = el("imageInput").files;

    if (!title) {
      alert("タイトルを入力してください。");
      return;
    }

    if (!files || !files.length) {
      alert("画像を選択してください。");
      return;
    }

    readImages(files, function (images) {
      posts.unshift({
        id: makeId(),
        title: title,
        note: note,
        visibility: visibility,
        password: visibility === "パスワード" ? password : "",
        sensitive: sensitive,
        revealed: !sensitive,
        images: images,
        createdAt: new Date().toLocaleDateString("ja-JP")
      });

      saveStorage();
      clearForm();
      el("formBox").className = "form";
      render();
    });
  }

  function render() {
    var box = el("postsBox");
    var q = el("searchInput").value.toLowerCase();
    var html = "";
    var count = 0;

    for (var i = 0; i < posts.length; i++) {
      var p = posts[i];
      var target = (p.title + " " + p.note).toLowerCase();
      if (q && target.indexOf(q) === -1) continue;

      count++;

      html += '<article class="post">';
      html += '<div class="post-head">';
      html += '<div><div class="title">' + escapeHtml(p.title) + '</div>';
      html += '<div class="meta">' + escapeHtml(p.visibility || "自分だけ") + ' / ' + escapeHtml(p.createdAt || "") + (p.sensitive ? ' / ワンクッション' : '') + '</div></div>';
      html += '<button class="sub" type="button" data-delete="' + escapeHtml(p.id) + '">削除</button>';
      html += '</div>';

      if (p.sensitive && !p.revealed) {
        html += '<div class="cover"><div><strong>ワンクッション</strong><br><span class="small">この投稿を表示しますか？</span><br><br><button type="button" data-reveal="' + escapeHtml(p.id) + '">表示する</button></div></div>';
      } else {
        html += '<div class="scroller">';
        for (var j = 0; j < p.images.length; j++) {
          html += '<div class="frame" data-open="' + escapeHtml(p.id) + '" data-index="' + j + '">';
          html += '<img src="' + p.images[j].src + '" alt="">';
          html += '</div>';
        }
        html += '</div>';
      }

      if (p.note) {
        html += '<div class="note">' + escapeHtml(p.note) + '</div>';
      }

      html += '</article>';
    }

    if (!count) {
      html = '<div class="empty">まだ投稿がありません。<br>＋投稿から画像を追加してください。</div>';
    }

    box.innerHTML = html;
    bindPostButtons();
  }

  function bindPostButtons() {
    var revealBtns = document.querySelectorAll("[data-reveal]");
    for (var i = 0; i < revealBtns.length; i++) {
      revealBtns[i].onclick = function () {
        var id = this.getAttribute("data-reveal");
        var p = findPost(id);
        if (!p) return;

        if (p.visibility === "パスワード") {
          var answer = prompt("パスワードを入力してください。");
          if (answer !== p.password) {
            alert("パスワードが違います。");
            return;
          }
        }

        p.revealed = true;
        saveStorage();
        render();
      };
    }

    var delBtns = document.querySelectorAll("[data-delete]");
    for (var j = 0; j < delBtns.length; j++) {
      delBtns[j].onclick = function () {
        var id = this.getAttribute("data-delete");
        if (!confirm("この投稿を削除しますか？")) return;
        posts = posts.filter(function (p) { return p.id !== id; });
        saveStorage();
        render();
      };
    }

    var frames = document.querySelectorAll("[data-open]");
    for (var k = 0; k < frames.length; k++) {
      frames[k].onclick = function () {
        var id = this.getAttribute("data-open");
        var index = parseInt(this.getAttribute("data-index"), 10) || 0;
        var p = findPost(id);
        if (!p) return;
        openViewer(p.images, index);
      };
    }
  }

  function findPost(id) {
    for (var i = 0; i < posts.length; i++) {
      if (posts[i].id === id) return posts[i];
    }
    return null;
  }

  function openViewer(images, index) {
    currentImages = images || [];
    currentIndex = index || 0;
    if (!currentImages.length) return;
    el("viewerImg").src = currentImages[currentIndex].src;
    el("viewer").className = "viewer show";
  }

  function closeViewer() {
    el("viewer").className = "viewer";
    el("viewerImg").src = "";
  }

  function moveViewer(step) {
    if (!currentImages.length) return;
    currentIndex += step;
    if (currentIndex < 0) currentIndex = currentImages.length - 1;
    if (currentIndex >= currentImages.length) currentIndex = 0;
    el("viewerImg").src = currentImages[currentIndex].src;
  }

  function backup() {
    var blob = new Blob([JSON.stringify(posts, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "posts.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }

  function restore(file) {
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(String(reader.result));
        if (!Array.isArray(data)) throw new Error("形式が違います");
        posts = data;
        saveStorage();
        render();
        alert("復元しました。");
      } catch (e) {
        showError("復元できませんでした。\n" + e.message);
      }
    };
    reader.readAsText(file);
  }

  el("openFormBtn").onclick = function () {
    var box = el("formBox");
    box.className = box.className.indexOf("show") >= 0 ? "form" : "form show";
  };

  el("visibilityInput").onchange = function () {
    el("passwordLabel").style.display = this.value === "パスワード" ? "block" : "none";
  };

  el("saveBtn").onclick = savePost;
  el("clearBtn").onclick = clearForm;
  el("searchInput").oninput = render;
  el("backupBtn").onclick = backup;

  el("restoreBtn").onclick = function () {
    el("restoreFile").click();
  };

  el("restoreFile").onchange = function () {
    if (this.files && this.files[0]) restore(this.files[0]);
    this.value = "";
  };

  el("closeViewerBtn").onclick = closeViewer;

  /* 右から左に読む漫画形式：
     次へ＝左方向に進むページ、前へ＝右方向に戻るページ */
  el("nextBtn").onclick = function () { moveViewer(1); };
  el("prevBtn").onclick = function () { moveViewer(-1); };

  document.onkeydown = function (e) {
    e = e || window.event;
    if (el("viewer").className.indexOf("show") < 0) return;
    if (e.key === "Escape") closeViewer();
    if (e.key === "ArrowLeft") moveViewer(1);
    if (e.key === "ArrowRight") moveViewer(-1);
  };

  load();
  render();
})();
</script>
</body>
</html>
