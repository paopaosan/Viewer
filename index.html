<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Private Pic Shelf</title>
  <style>
    :root {
      --bg: #171318;
      --panel: #231d25;
      --panel2: #2d2630;
      --text: #f7edf7;
      --muted: #bdaebe;
      --line: rgba(255,255,255,.12);
      --accent: #d9a7bd;
      --accent2: #f1d6e3;
      --danger: #eab0b0;
      --shadow: 0 14px 40px rgba(0,0,0,.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(217,167,189,.18), transparent 30%),
        radial-gradient(circle at 100% 20%, rgba(255,255,255,.08), transparent 24%),
        var(--bg);
      color: var(--text);
      min-height: 100svh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      background: rgba(23,19,24,.78);
      border-bottom: 1px solid var(--line);
      padding: 14px 16px 12px;
    }

    .topbar {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: .03em;
      line-height: 1.2;
    }

    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      color: var(--bg);
      background: var(--accent2);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,.18);
    }

    button.secondary {
      background: transparent;
      color: var(--accent2);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button.danger {
      color: #301818;
      background: var(--danger);
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 18px 14px 80px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 16px;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 999px;
      outline: none;
    }

    .search::placeholder { color: rgba(247,237,247,.5); }

    .form {
      display: none;
      background: rgba(35,29,37,.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
    }

    .form.open { display: block; }

    .grid {
      display: grid;
      gap: 10px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      display: grid;
      gap: 6px;
    }

    input[type="text"], input[type="password"], textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 16px;
      padding: 11px 12px;
      outline: none;
    }

    textarea { min-height: 92px; resize: vertical; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .checkline {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      margin: 4px 0;
    }

    .filedrop {
      border: 1px dashed rgba(255,255,255,.28);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,.04);
    }

    .filehint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .posts {
      display: grid;
      gap: 18px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 48px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.04);
    }

    .post {
      background: rgba(35,29,37,.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .postHead {
      padding: 14px 15px 10px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .title {
      font-size: 17px;
      font-weight: 800;
      margin: 0 0 5px;
      line-height: 1.35;
    }

    .meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      background: rgba(255,255,255,.04);
    }

    .deleteMini {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 7px 10px;
      box-shadow: none;
      font-size: 12px;
    }

    .scrollerWrap {
      position: relative;
      background: rgba(0,0,0,.18);
    }

    .scroller {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(78%, 1fr);
      gap: 10px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      overscroll-behavior-x: contain;
      padding: 0 15px 15px;
      scrollbar-width: thin;
    }

    .scroller.single {
      grid-auto-columns: 100%;
    }

    .frame {
      scroll-snap-align: center;
      border-radius: 18px;
      overflow: hidden;
      background: #0d0b0e;
      min-height: 220px;
      display: grid;
      place-items: center;
      cursor: zoom-in;
      border: 1px solid rgba(255,255,255,.08);
    }

    .frame img {
      width: 100%;
      height: 100%;
      max-height: 72svh;
      object-fit: contain;
      display: block;
      background: #0d0b0e;
    }

    .cover {
      margin: 0 15px 15px;
      min-height: 220px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(135deg, rgba(217,167,189,.18), rgba(255,255,255,.04)),
        rgba(0,0,0,.24);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 22px;
    }

    .cover strong {
      display: block;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .cover p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .body {
      padding: 0 15px 15px;
      color: var(--text);
      line-height: 1.75;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .tags {
      padding: 0 15px 15px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      color: var(--accent2);
      background: rgba(217,167,189,.12);
      border: 1px solid rgba(217,167,189,.25);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,0,.88);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 42px 12px 70px;
    }

    .viewer.open { display: flex; }

    .viewer img {
      max-width: 100%;
      max-height: 82svh;
      object-fit: contain;
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .viewerBtns {
      position: fixed;
      inset: auto 0 16px;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 12px;
    }

    .closeBtn {
      position: fixed;
      top: 14px;
      right: 14px;
      color: var(--text);
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.82);
      color: white;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      display: none;
      z-index: 80;
    }

    .toast.show { display: block; }

    @media (min-width: 760px) {
      h1 { font-size: 22px; }
      .form { padding: 20px; }
      .scroller { grid-auto-columns: minmax(520px, 68%); }
      .frame { min-height: 340px; }
      .cover { min-height: 340px; }
    }

    @media (max-width: 520px) {
      .topbar { align-items: start; }
      .toolbar { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
      header button { padding: 9px 11px; }
      .scroller { grid-auto-columns: 86%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>My Private Pic Shelf</h1>
        <div class="sub">自分用・横スクロール作品棚</div>
      </div>
      <button id="toggleForm">＋投稿</button>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <input id="search" class="search" type="search" placeholder="タイトル・本文・タグで検索" />
      <button class="secondary" id="exportBtn">バックアップ</button>
    </div>

    <section class="form" id="form">
      <div class="grid">
        <label>タイトル
          <input id="title" type="text" placeholder="例：落書きまとめ" />
        </label>

        <label>本文メモ
          <textarea id="note" placeholder="キャプション、差分メモ、置き場所メモなど"></textarea>
        </label>

        <div class="row">
          <label>タグ
            <input id="tags" type="text" placeholder="例：宿儺様, らくがき, 限定" />
          </label>

          <label>公開状態
            <select id="visibility">
              <option value="private">自分だけ</option>
              <option value="limited">限定公開</option>
              <option value="password">パスワード</option>
            </select>
          </label>
        </div>

        <label id="passwordLine" style="display:none;">パスワード
          <input id="password" type="password" placeholder="見る時の合言葉" />
        </label>

        <label class="checkline">
          <input id="sensitive" type="checkbox" />
          センシティブ用ワンクッションを入れる
        </label>

        <div class="filedrop">
          <label>画像
            <input id="images" type="file" accept="image/*" multiple />
          </label>
          <div class="filehint">
            画像はこの端末のブラウザ内に保存されます。大きい画像を大量に入れると保存上限に当たるので、最初は数枚で試すのがおすすめです。
          </div>
        </div>

        <div class="actions">
          <button id="saveBtn">保存</button>
          <button class="secondary" id="clearBtn" type="button">入力を消す</button>
          <button class="secondary" id="importBtn" type="button">復元</button>
          <input id="importFile" type="file" accept="application/json" hidden />
        </div>
      </div>
    </section>

    <section class="posts" id="posts"></section>
  </main>

  <div class="viewer" id="viewer">
    <button class="closeBtn" id="closeViewer">閉じる</button>
    <img id="viewerImg" alt="" />
    <div class="viewerBtns">
      <button class="secondary" id="prevImg">← 前</button>
      <button class="secondary" id="nextImg">次 →</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "privatePicShelf.posts.v1";
    let posts = loadPosts();
    let viewerSet = [];
    let viewerIndex = 0;

    const $ = (id) => document.getElementById(id);

    const form = $("form");
    const postsEl = $("posts");
    const toast = $("toast");

    $("toggleForm").addEventListener("click", () => form.classList.toggle("open"));
    $("search").addEventListener("input", render);
    $("visibility").addEventListener("change", () => {
      $("passwordLine").style.display = $("visibility").value === "password" ? "grid" : "none";
    });

    $("clearBtn").addEventListener("click", clearForm);
    $("saveBtn").addEventListener("click", savePost);
    $("exportBtn").addEventListener("click", exportPosts);
    $("importBtn").addEventListener("click", () => $("importFile").click());
    $("importFile").addEventListener("change", importPosts);

    $("closeViewer").addEventListener("click", closeViewer);
    $("prevImg").addEventListener("click", () => moveViewer(-1));
    $("nextImg").addEventListener("click", () => moveViewer(1));

    document.addEventListener("keydown", (e) => {
      if (!$("viewer").classList.contains("open")) return;
      if (e.key === "Escape") closeViewer();
      if (e.key === "ArrowLeft") moveViewer(-1);
      if (e.key === "ArrowRight") moveViewer(1);
    });

    render();

    function loadPosts() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function readFiles(files) {
      return Promise.all(Array.from(files).map(file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve({ name: file.name, src: reader.result });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      })));
    }

    async function savePost() {
      const title = $("title").value.trim();
      const note = $("note").value.trim();
      const tagList = $("tags").value
        .split(",")
        .map(t => t.trim())
        .filter(Boolean);
      const visibility = $("visibility").value;
      const password = $("password").value;
      const sensitive = $("sensitive").checked;
      const files = $("images").files;

      if (!title) {
        showToast("タイトルを入れてください");
        return;
      }
      if (!files.length) {
        showToast("画像を選んでください");
        return;
      }

      try {
        const images = await readFiles(files);
        const post = {
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
          title,
          note,
          tags: tagList,
          visibility,
          password: visibility === "password" ? password : "",
          sensitive,
          images,
          createdAt: new Date().toISOString(),
          revealed: !sensitive
        };

        posts.unshift(post);
        persist();
        clearForm();
        form.classList.remove("open");
        render();
        showToast("保存しました");
      } catch (e) {
        showToast("保存できませんでした");
      }
    }

    function clearForm() {
      $("title").value = "";
      $("note").value = "";
      $("tags").value = "";
      $("visibility").value = "private";
      $("password").value = "";
      $("passwordLine").style.display = "none";
      $("sensitive").checked = false;
      $("images").value = "";
    }

    function visibilityLabel(value) {
      if (value === "private") return "自分だけ";
      if (value === "limited") return "限定公開";
      if (value === "password") return "パスワード";
      return value;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString("ja-JP", { year: "numeric", month: "2-digit", day: "2-digit" });
    }

    function render() {
      const q = $("search").value.trim().toLowerCase();
      const filtered = posts.filter(p => {
        const hay = [p.title, p.note, ...(p.tags || [])].join(" ").toLowerCase();
        return hay.includes(q);
      });

      postsEl.innerHTML = "";

      if (!filtered.length) {
        postsEl.innerHTML = `<div class="empty">まだ投稿がありません。<br>「＋投稿」から画像を入れてみてください。</div>`;
        return;
      }

      for (const post of filtered) {
        const article = document.createElement("article");
        article.className = "post";

        const tags = (post.tags || []).map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join("");
        const badges = [
          `<span class="badge">${escapeHtml(visibilityLabel(post.visibility))}</span>`,
          `<span class="badge">${formatDate(post.createdAt)}</span>`,
          post.sensitive ? `<span class="badge">ワンクッション</span>` : ""
        ].join("");

        const imageArea = post.sensitive && !post.revealed
          ? `<div class="cover">
              <div>
                <strong>ワンクッション</strong>
                <p>この投稿はセンシティブ設定です。表示しますか？</p>
                <button data-reveal="${post.id}">表示する</button>
              </div>
            </div>`
          : `<div class="scroller ${post.images.length === 1 ? "single" : ""}">
              ${post.images.map((img, i) => `
                <div class="frame" data-open="${post.id}" data-index="${i}">
                  <img src="${img.src}" alt="${escapeHtml(img.name || post.title)}" loading="lazy">
                </div>
              `).join("")}
            </div>`;

        article.innerHTML = `
          <div class="postHead">
            <div>
              <h2 class="title">${escapeHtml(post.title)}</h2>
              <div class="meta">${badges}</div>
            </div>
            <button class="deleteMini" data-delete="${post.id}">削除</button>
          </div>
          <div class="scrollerWrap">${imageArea}</div>
          ${post.note ? `<div class="body">${escapeHtml(post.note)}</div>` : ""}
          ${tags ? `<div class="tags">${tags}</div>` : ""}
        `;
        postsEl.appendChild(article);
      }

      postsEl.querySelectorAll("[data-reveal]").forEach(btn => {
        btn.addEventListener("click", () => {
          const post = posts.find(p => p.id === btn.dataset.reveal);
          if (!post) return;
          if (post.visibility === "password") {
            const answer = prompt("パスワードを入力してください");
            if (answer !== post.password) {
              showToast("パスワードが違います");
              return;
            }
          }
          post.revealed = true;
          render();
        });
      });

      postsEl.querySelectorAll("[data-delete]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (!confirm("この投稿を削除しますか？")) return;
          posts = posts.filter(p => p.id !== btn.dataset.delete);
          persist();
          render();
          showToast("削除しました");
        });
      });

      postsEl.querySelectorAll("[data-open]").forEach(frame => {
        frame.addEventListener("click", () => {
          const post = posts.find(p => p.id === frame.dataset.open);
          if (!post) return;
          openViewer(post.images, Number(frame.dataset.index));
        });
      });
    }

    function openViewer(images, index) {
      viewerSet = images;
      viewerIndex = index;
      $("viewerImg").src = viewerSet[viewerIndex].src;
      $("viewer").classList.add("open");
    }

    function closeViewer() {
      $("viewer").classList.remove("open");
      $("viewerImg").src = "";
    }

    function moveViewer(delta) {
      if (!viewerSet.length) return;
      viewerIndex = (viewerIndex + delta + viewerSet.length) % viewerSet.length;
      $("viewerImg").src = viewerSet[viewerIndex].src;
    }

    function exportPosts() {
      const blob = new Blob([JSON.stringify(posts, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `private-pic-shelf-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importPosts(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data)) throw new Error("invalid");
          posts = data;
          persist();
          render();
          showToast("復元しました");
        } catch {
          showToast("復元できませんでした");
        }
      };
      reader.readAsText(file);
      e.target.value = "";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
